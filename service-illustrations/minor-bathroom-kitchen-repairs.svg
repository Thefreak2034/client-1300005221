<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="bk-basin" x1="36" y1="70" x2="124" y2="104" gradientUnits="userSpaceOnUse">
                <stop stop-color="#1a2540"/><stop offset="1" stop-color="#0e1220"/></linearGradient>
            <linearGradient id="bk-tap" x1="80" y1="24" x2="80" y2="70" gradientUnits="userSpaceOnUse">
                <stop stop-color="#5a9aff"/><stop offset="1" stop-color="#1646D2"/></linearGradient>
            <radialGradient id="bk-sh" cx="80" cy="106" r="48" gradientUnits="userSpaceOnUse">
                <stop stop-color="#0F3399" stop-opacity=".35"/><stop offset="1" stop-color="#0F3399" stop-opacity="0"/></radialGradient>
        </defs>
        <ellipse cx="80" cy="106" rx="50" ry="5" fill="url(#bk-sh)"/>
        <!-- basin counter -->
        <rect x="32" y="66" width="96" height="8" rx="2" fill="#243358" stroke="rgba(90,154,255,.4)" stroke-width=".9"/>
        <!-- basin bowl -->
        <path d="M46 74 L114 74 L108 100 C108 103 104 104 100 104 L60 104 C56 104 52 103 52 100 Z" fill="url(#bk-basin)" stroke="rgba(90,154,255,.5)" stroke-width="1.1"/>
        <ellipse cx="80" cy="76" rx="34" ry="4" fill="#0e1220" stroke="rgba(90,154,255,.4)" stroke-width=".7"/>
        <!-- drain -->
        <ellipse cx="80" cy="96" rx="5" ry="2" fill="#0e1220" stroke="rgba(90,154,255,.4)" stroke-width=".6"/>
        <!-- mixer tap (gooseneck) -->
        <g>
            <rect x="76" y="56" width="8" height="12" rx="2" fill="url(#bk-tap)" stroke="rgba(255,255,255,.3)" stroke-width=".6"/>
            <path d="M80 56 C80 36 80 30 92 28 C100 27 100 36 100 42" stroke="url(#bk-tap)" stroke-width="6" fill="none" stroke-linecap="round"/>
            <path d="M80 56 C80 38 80 32 92 30" stroke="rgba(255,255,255,.35)" stroke-width="1.4" fill="none"/>
            <!-- spout tip -->
            <rect x="97" y="42" width="6" height="5" rx="1.5" fill="#1646D2" stroke="rgba(255,255,255,.3)" stroke-width=".5"/>
            <!-- lever handle -->
            <rect x="72" y="52" width="10" height="3.5" rx="1.5" fill="#5a9aff"/>
        </g>
        <!-- single water drop falling -->
        <path d="M100 52 C100 52 97 57 97 60 C97 62 98.5 63 100 63 C101.5 63 103 62 103 60 C103 57 100 52 100 52 Z" fill="#5a9aff" opacity=".85"/>
        <circle cx="100" cy="58" r="1" fill="rgba(255,255,255,.5)"/>
        <!-- small spanner resting on counter -->
        <g transform="translate(40,60) rotate(-14)">
            <rect x="0" y="0" width="22" height="4" rx="2" fill="#F59E0B" opacity=".85"/>
            <path d="M-5 -3 L-5 5 L-1 5 L-1 1 L3 1 L3 5 L7 5 L7 -3 L3 -1 L-1 -1 Z" fill="#F59E0B" opacity=".85" stroke="rgba(255,255,255,.3)" stroke-width=".5"/>
            <circle cx="22" cy="2" r="3.5" fill="none" stroke="#F59E0B" stroke-width="2" opacity=".85"/>
        </g>
    </svg>