<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="tv-body" x1="40" y1="28" x2="120" y2="82" gradientUnits="userSpaceOnUse">
                <stop stop-color="#1a2540"/><stop offset="1" stop-color="#0e1220"/></linearGradient>
            <radialGradient id="tv-screen" cx="80" cy="55" r="42" gradientUnits="userSpaceOnUse">
                <stop stop-color="#1646D2" stop-opacity=".5"/><stop offset="1" stop-color="#0e1220" stop-opacity=".1"/></radialGradient>
            <radialGradient id="tv-sh" cx="80" cy="100" r="44" gradientUnits="userSpaceOnUse">
                <stop stop-color="#0F3399" stop-opacity=".35"/><stop offset="1" stop-color="#0F3399" stop-opacity="0"/></radialGradient>
        </defs>
        <ellipse cx="80" cy="100" rx="46" ry="5" fill="url(#tv-sh)"/>
        <!-- wall plate / bracket arm -->
        <rect x="74" y="78" width="12" height="14" rx="1.5" fill="#243358" stroke="rgba(90,154,255,.45)" stroke-width=".9"/>
        <rect x="70" y="90" width="20" height="4" rx="1.5" fill="#1a2540" stroke="rgba(90,154,255,.4)" stroke-width=".7"/>
        <!-- TV bezel -->
        <rect x="34" y="28" width="92" height="54" rx="3" fill="url(#tv-body)" stroke="rgba(90,154,255,.55)" stroke-width="1.4"/>
        <!-- screen glow -->
        <rect x="40" y="34" width="80" height="42" rx="2" fill="url(#tv-screen)"/>
        <rect x="40" y="34" width="80" height="42" rx="2" fill="none" stroke="rgba(90,154,255,.4)" stroke-width=".8"/>
        <!-- screen reflection streaks -->
        <path d="M48 38 L60 72" stroke="rgba(255,255,255,.12)" stroke-width="3" stroke-linecap="round"/>
        <path d="M70 38 L80 64" stroke="rgba(255,255,255,.08)" stroke-width="2" stroke-linecap="round"/>
        <!-- standby led -->
        <circle cx="80" cy="78.5" r="1.3" fill="#5a9aff"/>
        <!-- spirit level on top -->
        <g transform="translate(50,18)">
            <rect x="0" y="0" width="44" height="8" rx="1.5" fill="#F59E0B" opacity=".85" stroke="rgba(255,255,255,.4)" stroke-width=".6"/>
            <rect x="17" y="2" width="10" height="4" rx="2" fill="#0e1220"/>
            <circle cx="22" cy="4" r="1.5" fill="#5a9aff"/>
            <rect x="4" y="3" width="6" height="2" rx="1" fill="rgba(14,18,32,.5)"/>
            <rect x="34" y="3" width="6" height="2" rx="1" fill="rgba(14,18,32,.5)"/>
        </g>
    </svg>