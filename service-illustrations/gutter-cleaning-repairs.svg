<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="gc-roof" x1="40" y1="20" x2="120" y2="55" gradientUnits="userSpaceOnUse">
                <stop stop-color="#243358"/><stop offset="1" stop-color="#141c32"/></linearGradient>
            <linearGradient id="gc-gut" x1="30" y1="58" x2="130" y2="72" gradientUnits="userSpaceOnUse">
                <stop stop-color="#1a2540"/><stop offset="1" stop-color="#0e1220"/></linearGradient>
            <radialGradient id="gc-sh" cx="80" cy="106" r="46" gradientUnits="userSpaceOnUse">
                <stop stop-color="#0F3399" stop-opacity=".4"/><stop offset="1" stop-color="#0F3399" stop-opacity="0"/></radialGradient>
        </defs>
        <ellipse cx="80" cy="106" rx="48" ry="6" fill="url(#gc-sh)"/>
        <!-- roof slope -->
        <path d="M30 52 L100 18 L132 30 L132 52 Z" fill="url(#gc-roof)" stroke="rgba(90,154,255,.4)" stroke-width="1"/>
        <!-- roof shingle lines -->
        <path d="M48 44 L120 26" stroke="rgba(90,154,255,.22)" stroke-width=".7"/>
        <path d="M40 50 L116 32" stroke="rgba(90,154,255,.15)" stroke-width=".6"/>
        <!-- gutter trough -->
        <path d="M28 56 L132 56 L132 70 C132 73 129 74 126 74 L34 74 C31 74 28 73 28 70 Z" fill="url(#gc-gut)" stroke="rgba(90,154,255,.5)" stroke-width="1.2"/>
        <rect x="28" y="56" width="104" height="3" fill="#1646D2" opacity=".4"/>
        <!-- downpipe -->
        <rect x="120" y="74" width="8" height="32" rx="1.5" fill="#1a2540" stroke="rgba(90,154,255,.4)" stroke-width=".9"/>
        <!-- leaves in gutter -->
        <ellipse cx="46" cy="65" rx="5" ry="3" fill="#1646D2" opacity=".6" transform="rotate(-18 46 65)"/>
        <ellipse cx="60" cy="67" rx="5.5" ry="3.2" fill="#5a9aff" opacity=".5" transform="rotate(12 60 67)"/>
        <ellipse cx="74" cy="65" rx="5" ry="3" fill="#1646D2" opacity=".55" transform="rotate(-8 74 65)"/>
        <ellipse cx="88" cy="67" rx="5.5" ry="3.2" fill="#5a9aff" opacity=".45" transform="rotate(20 88 67)"/>
        <path d="M46 65 L46 62 M60 67 L60 63 M74 65 L74 62 M88 67 L88 63" stroke="rgba(14,18,32,.6)" stroke-width=".6"/>
        <!-- ladder leaning -->
        <g stroke="#5a9aff" stroke-width="2.4" stroke-linecap="round">
            <line x1="100" y1="40" x2="86" y2="108"/>
            <line x1="110" y1="42" x2="98" y2="108"/>
        </g>
        <g stroke="#5a9aff" stroke-width="1.6" opacity=".85">
            <line x1="103" y1="56" x2="91" y2="56"/>
            <line x1="101" y1="70" x2="89" y2="70"/>
            <line x1="99" y1="84" x2="87" y2="84"/>
            <line x1="97" y1="98" x2="85" y2="98"/>
        </g>
    </svg>