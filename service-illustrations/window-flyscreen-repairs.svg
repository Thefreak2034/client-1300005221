            <path d="M44 34 L78 34"/><path d="M44 40 L78 40"/><path d="M44 46 L78 46"/><path d="M44 52 L78 52"/><path d="M44 58 L78 58"/><path d="M44 64 L78 64"/><path d="M44 70 L78 70"/><path d="M44 76 L78 76"/><path d="M44 82 L78 82"/><path d="M44 88 L78 88"/>
