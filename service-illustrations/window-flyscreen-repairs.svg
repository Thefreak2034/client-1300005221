<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="wf-frame" x1="34" y1="18" x2="126" y2="104" gradientUnits="userSpaceOnUse">
