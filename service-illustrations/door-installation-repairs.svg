<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="dr-frame" x1="40" y1="14" x2="120" y2="110" gradientUnits="userSpaceOnUse">
                <stop stop-color="#243358"/><stop offset="1" stop-color="#141c32"/></linearGradient>
            <linearGradient id="dr-door" x1="50" y1="18" x2="110" y2="104" gradientUnits="userSpaceOnUse">
                <stop stop-color="#1a2540"/><stop offset="1" stop-color="#0e1220"/></linearGradient>
            <radialGradient id="dr-sh" cx="80" cy="110" r="44" gradientUnits="userSpaceOnUse">
                <stop stop-color="#0F3399" stop-opacity=".4"/><stop offset="1" stop-color="#0F3399" stop-opacity="0"/></radialGradient>
        </defs>
        <ellipse cx="82" cy="110" rx="46" ry="5" fill="url(#dr-sh)"/>
        <!-- door frame (outer) -->
        <rect x="40" y="14" width="80" height="96" rx="2" fill="url(#dr-frame)" stroke="rgba(90,154,255,.4)" stroke-width="1.1"/>
        <!-- dark opening behind -->
        <rect x="48" y="20" width="64" height="90" fill="#070b16"/>
        <!-- door leaf, ajar (slight perspective) -->
        <path d="M48 20 L104 26 L104 104 L48 110 Z" fill="url(#dr-door)" stroke="rgba(90,154,255,.55)" stroke-width="1.2"/>
        <!-- recessed panels -->
        <rect x="56" y="30" width="40" height="28" rx="2" fill="none" stroke="rgba(90,154,255,.3)" stroke-width="1"/>
        <rect x="56" y="64" width="40" height="38" rx="2" fill="none" stroke="rgba(90,154,255,.3)" stroke-width="1"/>
        <!-- highlight edge -->
        <path d="M52 24 L52 106" stroke="rgba(255,255,255,.12)" stroke-width="1.4"/>
        <!-- handle -->
        <circle cx="60" cy="66" r="3.2" fill="#5a9aff" stroke="rgba(255,255,255,.4)" stroke-width=".6"/>
        <rect x="56" y="64.5" width="9" height="3" rx="1.5" fill="#1646D2"/>
        <!-- hinges on frame side -->
        <g fill="#5a9aff" opacity=".9">
            <rect x="104" y="32" width="5" height="10" rx="1"/>
            <rect x="104" y="60" width="5" height="10" rx="1"/>
            <rect x="104" y="88" width="5" height="10" rx="1"/>
        </g>
        <circle cx="106.5" cy="37" r=".9" fill="#0e1220"/>
        <circle cx="106.5" cy="65" r=".9" fill="#0e1220"/>
        <circle cx="106.5" cy="93" r=".9" fill="#0e1220"/>
    </svg>