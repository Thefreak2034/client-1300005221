<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="rr-bin" x1="32" y1="58" x2="128" y2="100" gradientUnits="userSpaceOnUse">
                <stop stop-color="#1a2540"/><stop offset="1" stop-color="#0e1220"/></linearGradient>
            <radialGradient id="rr-sh" cx="80" cy="104" r="50" gradientUnits="userSpaceOnUse">
                <stop stop-color="#0F3399" stop-opacity=".4"/><stop offset="1" stop-color="#0F3399" stop-opacity="0"/></radialGradient>
        </defs>
        <ellipse cx="80" cy="104" rx="52" ry="6" fill="url(#rr-sh)"/>
        <!-- skip bin trapezoid body -->
        <path d="M32 58 L128 58 L116 98 L44 98 Z" fill="url(#rr-bin)" stroke="rgba(90,154,255,.5)" stroke-width="1.2"/>
        <!-- top rim -->
        <path d="M30 56 L130 56 L128 62 L32 62 Z" fill="#243358" stroke="rgba(90,154,255,.5)" stroke-width="1"/>
        <!-- side ribs -->
        <path d="M52 62 L48 96" stroke="rgba(90,154,255,.2)" stroke-width=".8"/>
        <path d="M80 62 L80 96" stroke="rgba(90,154,255,.18)" stroke-width=".8"/>
        <path d="M108 62 L112 96" stroke="rgba(90,154,255,.2)" stroke-width=".8"/>
        <!-- blue trim band -->
        <path d="M44 92 L116 92 L114 96 L46 96 Z" fill="#1646D2" opacity=".4"/>
        <!-- branches sticking out -->
        <g stroke="#5a9aff" stroke-width="2" stroke-linecap="round" fill="none" opacity=".85">
            <path d="M50 56 C46 46 52 42 50 34"/>
            <path d="M50 44 L44 40 M50 40 L56 35"/>
            <path d="M64 56 C66 48 60 44 64 38"/>
            <path d="M64 46 L58 42"/>
        </g>
        <!-- cardboard box poking out -->
        <g transform="translate(92,42) rotate(12)">
            <rect x="0" y="0" width="22" height="16" rx="1.5" fill="#243358" stroke="rgba(90,154,255,.5)" stroke-width=".9"/>
            <path d="M0 6 L22 6" stroke="rgba(90,154,255,.4)" stroke-width=".7"/>
            <path d="M11 0 L11 16" stroke="rgba(90,154,255,.35)" stroke-width=".7"/>
        </g>
        <!-- crumpled waste bits -->
        <circle cx="74" cy="50" r="3" fill="#1646D2" opacity=".5"/>
        <circle cx="84" cy="53" r="2.2" fill="#5a9aff" opacity=".4"/>
    </svg>