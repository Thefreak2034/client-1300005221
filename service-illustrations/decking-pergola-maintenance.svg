<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="dk-deck" x1="20" y1="70" x2="140" y2="110" gradientUnits="userSpaceOnUse">
                <stop stop-color="#1f2c4c"/><stop offset="1" stop-color="#0e1220"/></linearGradient>
            <linearGradient id="dk-beam" x1="20" y1="24" x2="140" y2="34" gradientUnits="userSpaceOnUse">
                <stop stop-color="#243358"/><stop offset="1" stop-color="#141c32"/></linearGradient>
            <radialGradient id="dk-sh" cx="80" cy="112" r="52" gradientUnits="userSpaceOnUse">
                <stop stop-color="#0F3399" stop-opacity=".35"/><stop offset="1" stop-color="#0F3399" stop-opacity="0"/></radialGradient>
        </defs>
        <ellipse cx="80" cy="112" rx="54" ry="5" fill="url(#dk-sh)"/>
        <!-- pergola beams overhead -->
        <rect x="14" y="22" width="132" height="9" rx="1.5" fill="url(#dk-beam)" stroke="rgba(90,154,255,.4)" stroke-width=".9"/>
        <g fill="#1a2540" stroke="rgba(90,154,255,.4)" stroke-width=".8">
            <rect x="30" y="14" width="9" height="18" rx="1"/>
            <rect x="76" y="14" width="9" height="18" rx="1"/>
            <rect x="122" y="14" width="9" height="18" rx="1"/>
        </g>
        <!-- support posts -->
        <rect x="22" y="31" width="7" height="64" fill="#1a2540" stroke="rgba(90,154,255,.35)" stroke-width=".8"/>
        <rect x="132" y="31" width="7" height="64" fill="#1a2540" stroke="rgba(90,154,255,.35)" stroke-width=".8"/>
        <!-- deck surface in perspective (converging boards) -->
        <path d="M16 96 L144 96 L120 112 L40 112 Z" fill="url(#dk-deck)" stroke="rgba(90,154,255,.4)" stroke-width="1"/>
        <g stroke="rgba(90,154,255,.3)" stroke-width=".8">
            <path d="M50 96 L57 112"/><path d="M68 96 L72 112"/><path d="M86 96 L88 112"/><path d="M104 96 L102 112"/><path d="M120 96 L116 112"/>
        </g>
        <!-- board grain highlights -->
        <path d="M22 99 L138 99" stroke="rgba(255,255,255,.1)" stroke-width=".7"/>
        <!-- a couple of fresh-stain swipes (blue accent) -->
        <path d="M60 102 L92 102" stroke="#5a9aff" stroke-width="2" opacity=".55" stroke-linecap="round"/>
    </svg>