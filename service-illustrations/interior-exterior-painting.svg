<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="pt-wall" x1="20" y1="18" x2="140" y2="90" gradientUnits="userSpaceOnUse">
                <stop stop-color="#141c32"/><stop offset="1" stop-color="#0e1220"/></linearGradient>
            <linearGradient id="pt-strip" x1="60" y1="20" x2="60" y2="78" gradientUnits="userSpaceOnUse">
                <stop stop-color="#5a9aff" stop-opacity=".85"/><stop offset="1" stop-color="#1646D2" stop-opacity=".7"/></linearGradient>
            <radialGradient id="pt-sh" cx="80" cy="108" r="48" gradientUnits="userSpaceOnUse">
                <stop stop-color="#0F3399" stop-opacity=".35"/><stop offset="1" stop-color="#0F3399" stop-opacity="0"/></radialGradient>
        </defs>
        <ellipse cx="80" cy="108" rx="50" ry="5" fill="url(#pt-sh)"/>
        <!-- wall -->
        <rect x="20" y="16" width="120" height="74" rx="3" fill="url(#pt-wall)" stroke="rgba(90,154,255,.3)" stroke-width="1"/>
        <!-- fresh painted strip (blue) -->
        <rect x="46" y="20" width="30" height="58" rx="2" fill="url(#pt-strip)"/>
        <!-- roller texture in the strip -->
        <path d="M50 24 L72 24 M50 36 L72 36 M50 48 L72 48 M50 60 L72 60" stroke="rgba(255,255,255,.18)" stroke-width="1"/>
        <!-- paint roller head -->
        <g transform="translate(0,0)">
            <rect x="44" y="20" width="34" height="11" rx="5.5" fill="#243358" stroke="rgba(90,154,255,.6)" stroke-width="1"/>
            <rect x="46" y="22" width="30" height="3" rx="1.5" fill="rgba(255,255,255,.18)"/>
            <!-- frame -->
            <path d="M78 25 L92 25 L92 44" stroke="#5a9aff" stroke-width="2.6" fill="none" stroke-linecap="round"/>
            <!-- handle -->
            <rect x="89" y="44" width="6" height="30" rx="3" fill="#1646D2" stroke="rgba(255,255,255,.3)" stroke-width=".6"/>
            <rect x="90.5" y="48" width="2" height="20" fill="rgba(255,255,255,.2)"/>
        </g>
        <!-- paint tray below -->
        <g transform="translate(0,0)">
            <path d="M40 96 L120 96 L112 110 L48 110 Z" fill="#1a2540" stroke="rgba(90,154,255,.45)" stroke-width="1"/>
            <!-- ramp/well -->
            <path d="M48 96 L112 96 L106 100 L54 100 Z" fill="#0e1220"/>
            <!-- paint pool -->
            <path d="M54 100 L106 100 L100 108 L60 108 Z" fill="#1646D2" opacity=".8"/>
            <path d="M62 103 L96 103" stroke="rgba(255,255,255,.2)" stroke-width="1"/>
        </g>
    </svg>