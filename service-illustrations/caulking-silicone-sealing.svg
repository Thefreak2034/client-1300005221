<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
 <defs>
  <linearGradient id="cs2-tube" x1="30" y1="40" x2="86" y2="60" gradientUnits="userSpaceOnUse"><stop stop-color="#33457a"/><stop offset="1" stop-color="#1a2540"/></linearGradient>
  <radialGradient id="cs2-sh" cx="80" cy="106" r="50" gradientUnits="userSpaceOnUse"><stop stop-color="#0F3399" stop-opacity=".32"/><stop offset="1" stop-color="#0F3399" stop-opacity="0"/></radialGradient>
