<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="ct-plank" x1="20" y1="70" x2="140" y2="95" gradientUnits="userSpaceOnUse">
                <stop stop-color="#1a2540"/><stop offset=".5" stop-color="#243358"/><stop offset="1" stop-color="#141c32"/></linearGradient>
            <linearGradient id="ct-blade" x1="40" y1="38" x2="120" y2="60" gradientUnits="userSpaceOnUse">
                <stop stop-color="#5a9aff"/><stop offset="1" stop-color="#1646D2"/></linearGradient>
            <radialGradient id="ct-sh" cx="80" cy="100" r="50" gradientUnits="userSpaceOnUse">
                <stop stop-color="#0F3399" stop-opacity=".4"/><stop offset="1" stop-color="#0F3399" stop-opacity="0"/></radialGradient>
        </defs>
        <ellipse cx="80" cy="100" rx="52" ry="6" fill="url(#ct-sh)"/>
        <!-- timber plank -->
        <rect x="22" y="74" width="116" height="22" rx="2" fill="url(#ct-plank)" stroke="rgba(90,154,255,.4)" stroke-width="1"/>
        <!-- wood grain lines -->
        <path d="M26 80 C60 78 100 82 134 80" stroke="rgba(90,154,255,.28)" stroke-width=".7" fill="none"/>
        <path d="M26 86 C60 88 100 84 134 87" stroke="rgba(90,154,255,.2)" stroke-width=".7" fill="none"/>
        <path d="M26 92 C60 90 100 93 134 91" stroke="rgba(90,154,255,.15)" stroke-width=".6" fill="none"/>
        <!-- cut kerf in plank -->
        <path d="M84 74 L80 96" stroke="#0e1220" stroke-width="2.4"/>
        <path d="M84 74 L80 96" stroke="rgba(90,154,255,.3)" stroke-width=".6"/>
        <!-- saw blade -->
        <path d="M44 40 L120 52 L116 60 L40 48 Z" fill="url(#ct-blade)" stroke="rgba(255,255,255,.4)" stroke-width=".8"/>
        <!-- teeth along bottom edge of blade -->
        <path d="M40 48 L44 52 L48 49 L52 53 L56 50 L60 54 L64 51 L68 55 L72 52 L76 56 L80 53 L84 57 L88 54 L92 58 L96 55 L100 59 L104 56 L108 60 L112 57 L116 60"
              fill="none" stroke="#5a9aff" stroke-width="1.4" stroke-linejoin="round"/>
        <!-- blade shine -->
        <path d="M48 44 L114 54" stroke="rgba(255,255,255,.45)" stroke-width="1" stroke-linecap="round"/>
        <!-- wood handle -->
        <path d="M44 40 C36 36 30 40 30 48 C30 56 38 60 46 56 L42 49 Z" fill="#243358" stroke="rgba(90,154,255,.5)" stroke-width="1"/>
        <rect x="34" y="44" width="9" height="3" rx="1.5" fill="#0e1220"/>
        <!-- sawdust specks -->
        <circle cx="78" cy="100" r="1.3" fill="#5a9aff" opacity=".55"/>
        <circle cx="86" cy="103" r="1" fill="#5a9aff" opacity=".4"/>
        <circle cx="72" cy="104" r="1.1" fill="#5a9aff" opacity=".35"/>
        <circle cx="90" cy="99" r="1" fill="#5a9aff" opacity=".5"/>
    </svg>