<svg viewBox="0 0 160 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
            <linearGradient id="pl-wall" x1="20" y1="20" x2="140" y2="100" gradientUnits="userSpaceOnUse">
                <stop stop-color="#1a2540"/><stop offset="1" stop-color="#0e1220"/></linearGradient>
            <linearGradient id="pl-patch" x1="50" y1="40" x2="110" y2="80" gradientUnits="userSpaceOnUse">
                <stop stop-color="#2e3f6a"/><stop offset="1" stop-color="#1a2540"/></linearGradient>
            <linearGradient id="pl-trowel" x1="80" y1="60" x2="130" y2="40" gradientUnits="userSpaceOnUse">
                <stop stop-color="#5a9aff"/><stop offset="1" stop-color="#1646D2"/></linearGradient>
            <radialGradient id="pl-sh" cx="80" cy="106" r="46" gradientUnits="userSpaceOnUse">
                <stop stop-color="#0F3399" stop-opacity=".35"/><stop offset="1" stop-color="#0F3399" stop-opacity="0"/></radialGradient>
        </defs>
        <ellipse cx="80" cy="106" rx="48" ry="5" fill="url(#pl-sh)"/>
        <!-- wall -->
        <rect x="22" y="16" width="116" height="88" rx="3" fill="url(#pl-wall)" stroke="rgba(90,154,255,.35)" stroke-width="1"/>
        <!-- faint gyprock joint lines -->
        <path d="M22 50 L138 50" stroke="rgba(90,154,255,.12)" stroke-width=".7"/>
        <path d="M80 16 L80 104" stroke="rgba(90,154,255,.1)" stroke-width=".7"/>
        <!-- smoothed render patch (lighter) -->
        <path d="M48 44 C66 40 96 42 108 56 C112 70 92 80 72 78 C56 76 46 60 48 44 Z" fill="url(#pl-patch)" stroke="rgba(90,154,255,.5)" stroke-width="1"/>
        <path d="M56 50 C74 48 92 52 100 60" stroke="rgba(255,255,255,.14)" stroke-width="1" fill="none"/>
        <!-- excess plaster smear trailing the trowel -->
        <path d="M100 56 C112 52 120 50 128 52" stroke="rgba(90,154,255,.3)" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- trowel blade -->
        <g transform="translate(0,0)">
            <path d="M92 46 L128 38 L132 50 L98 60 Z" fill="url(#pl-trowel)" stroke="rgba(255,255,255,.4)" stroke-width=".8"/>
            <path d="M98 50 L126 44" stroke="rgba(255,255,255,.45)" stroke-width=".9"/>
            <!-- mount + handle -->
            <rect x="112" y="32" width="6" height="8" rx="1" fill="#0e1220" stroke="rgba(90,154,255,.5)" stroke-width=".7"/>
            <path d="M108 26 C108 22 124 22 124 26 C124 30 120 32 115 32 C110 32 108 30 108 26 Z" fill="#243358" stroke="rgba(90,154,255,.5)" stroke-width=".9"/>
        </g>
    </svg>